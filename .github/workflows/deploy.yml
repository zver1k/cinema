name: Deploy Cinema

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: deploy-cinema
  cancel-in-progress: true

env:
  APP_NAME: cinema
  BUN_VERSION: 1.3.9
  DEPLOY_BASE: /var/www/damir/data/www/cinema.damirmedia.ru
  APP_PORT: "3004"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run build` = prisma generate && next build (output: standalone).
      # Env передаём и на билд: /new использует ISR и фетчит Kinopoisk на сборке;
      # модули prisma/auth читают env при импорте. На 402 билд не падает (загрузчики
      # ловят ошибку и возвращают пусто).
      - name: Build
        run: bun run build
        env:
          NEXT_DEPLOYMENT_ID: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}

      # Standalone-сборка не включает static/public и prisma — докладываем вручную.
      - name: Prepare standalone bundle
        run: |
          mkdir -p .next/standalone/.next
          if [ -d public ]; then
            cp -r public .next/standalone/public
          fi
          cp -r .next/static .next/standalone/.next/static
          # Схема + миграции для `prisma migrate deploy` на сервере.
          # Основной prisma.config.ts импортирует `prisma/config` и `dotenv/config`;
          # в standalone-релизе этих пакетов нет, поэтому кладём минимальный config
          # без импортов. Prisma 7 больше не поддерживает datasource.url в schema.
          cp -r prisma .next/standalone/prisma
          cat > .next/standalone/prisma.config.ts <<'EOF'
          export default {
            schema: "prisma/schema.prisma",
            migrations: {
              path: "prisma/migrations",
            },
            datasource: {
              url: process.env.DATABASE_URL,
            },
          };
          EOF

      - name: Package build
        run: tar -czf artifact.tar.gz -C .next/standalone .

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Upload to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: artifact.tar.gz
          target: /tmp/cinema-deploy/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_NAME,BUN_VERSION,DEPLOY_BASE,APP_PORT,DATABASE_URL,API_URL,API_KEY,BETTER_AUTH_SECRET,BETTER_AUTH_URL
          script: |
            set -e

            BASE=$DEPLOY_BASE
            RELEASES=$BASE/releases
            CURRENT=$BASE/current
            SHARED=$BASE/shared

            mkdir -p $RELEASES $SHARED

            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            NEW_RELEASE=$RELEASES/$TIMESTAMP

            mkdir -p $NEW_RELEASE
            tar -xzf /tmp/cinema-deploy/artifact.tar.gz -C $NEW_RELEASE
            rm -f /tmp/cinema-deploy/artifact.tar.gz

            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if ! command -v bun >/dev/null 2>&1 || [ "$(bun --version)" != "$BUN_VERSION" ]; then
              curl -fsSL https://bun.com/install | bash -s "bun-v$BUN_VERSION"
              export PATH="$BUN_INSTALL/bin:$PATH"
            fi
            BUN_BIN=$(command -v bun)
            bun --version

            # shared/.env — единый источник рантайм-переменных, переживает релизы
            cat > $SHARED/.env <<EOF
            NODE_ENV=production
            PORT=$APP_PORT
            DATABASE_URL=$DATABASE_URL
            API_URL=$API_URL
            API_KEY=$API_KEY
            BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
            BETTER_AUTH_URL=$BETTER_AUTH_URL
            EOF
            ln -sfn $SHARED/.env $NEW_RELEASE/.env

            # грузим env в текущую сессию для миграций и pm2
            set -a
            . $SHARED/.env
            set +a

            # применяем миграции к проду через минимальный prisma.config.ts из релиза.
            cd $NEW_RELEASE
            bunx --bun prisma@7 migrate deploy

            ln -sfn $NEW_RELEASE $CURRENT

            if pm2 describe $APP_NAME >/dev/null 2>&1; then
              pm2 delete $APP_NAME
            fi

            pm2 start $CURRENT/server.js --name $APP_NAME --cwd $CURRENT --interpreter "$BUN_BIN" --update-env
            pm2 save

            # оставляем 5 последних релизов
            ls -dt $RELEASES/* | tail -n +6 | xargs -r rm -rf

            echo "Deploy done: $TIMESTAMP"
